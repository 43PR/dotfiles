#############################
# HYPRLAND - i3 STYLE CONFIG
#############################

# MONITORS
monitor = ,preferred,auto,1

#############################
# VARIABLES
#############################

$mod = SUPER

$terminal = kitty
$menu = rofi -show drun
$fileManager = thunar
$browser = brave

#############################
# AUTOSTART
#############################

exec-once = waybar
exec-once = dunst
exec-once = nm-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = awww-daemon
exec-once = sleep 1 && awww img /home/rp34/Pictures/W/w3.png

#############################
# ENVIRONMENT
#############################

env = XCURSOR_SIZE,18
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1

#############################
# INPUT
#############################

input {
    kb_layout = us

    follow_mouse = 1

    touchpad {
        natural_scroll = false
        tap-to-click = true
    }

    sensitivity = 0.5
}

#############################
# GENERAL
#############################

general {
    gaps_in = 5
    gaps_out = 2

    border_size = 0

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

#############################
# DECORATION
#############################

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

#############################
# ANIMATIONS
#############################

animations {
    enabled = yes

    bezier = easeOut,0.05,0.9,0.1,1.0

    animation = windows,1,10,easeOut
    animation = windowsOut,1,10,easeOut
    animation = border,1,15,default
    animation = fade,1,10,default
    animation = workspaces,1,10,default
}

#############################
# LAYOUT
#############################

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

#############################
# KEYBINDS

# Wallpapers

bind = SUPER, right, exec, ~/.config/hypr/scripts/wallpaper-cycle.sh next
bind = SUPER, left, exec, ~/.config/hypr/scripts/wallpaper-cycle.sh prev

# Apps
bind = $mod, T, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, E, exec, $fileManager
bind = $mod, B, exec, $browser

# Close
bind = $mod, Q, killactive,

# Exit session
bind = $mod SHIFT, E, exit,

# Reload config
bind = $mod SHIFT, R, exec, hyprctl reload

#############################
# FOCUS (i3/Vim style)
#############################

bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

#############################
# MOVE WINDOWS
#############################

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

#############################
# RESIZE WINDOWS
#############################

binde = $mod CTRL, H, resizeactive, -40 0
binde = $mod CTRL, L, resizeactive, 40 0
binde = $mod CTRL, K, resizeactive, 0 -40
binde = $mod CTRL, J, resizeactive, 0 40

#############################
# FLOATING
#############################

bind = $mod, Space, togglefloating,

# Fullscreen
bind = $mod, F, fullscreen

#############################
# WORKSPACES
#############################

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

#############################
# MOUSE
#############################

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

#############################
# SCREENSHOTS
#############################

bind = $mod, Delete, exec, grim ~/Pictures/$(date +%s).png

bind = , Delete, exec, grim -g "$(slurp)" ~/Pictures/$(date +%s).png

#############################
# CLIPBOARD HISTORY
#############################

bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

#############################
# MEDIA KEYS
#############################

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

#############################
# WINDOW RULES
#############################

windowrule {
    name = opacity
    match:class = ^(kitty|xed|thunar|brave-browser|discord|steam|GeForceNOW|Spotify)$
    opacity = 0.7 0.65
}

windowrule {
    name = float
    match:class = ^(pavucontrol)$
}

windowrule {
    name = float
    match:class = ^(nm-connection-editor)$
}

windowrule {
    name = float
    match:class = ^(blueman-manager)$
}

windowrule {
    name = float
    match:title = ^(Open File)$
}

windowrule {
    name = float
    match:title = ^(Save File)$
}

#############################
# MISC
#############################

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

